name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages "Source" is the gh-pages branch, so this workflow builds the site and
# publishes the built output to gh-pages on every push to main. (The base is
# "/" for the infrix.opendlt.org custom domain; docs/public/CNAME carries the
# domain into the build output.)
permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Relocated docs-site fence: every nav/sidebar-linked page must exist,
      # vitepress config well-formed, governance-first framing intact.
      - run: node --test docs-structure.test.mjs
      - run: npm run build
      - name: Publish to gh-pages
        run: |
          cd docs/.vitepress/dist
          touch .nojekyll
          test -f CNAME || echo "infrix.opendlt.org" > CNAME
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${{ github.sha }}"
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
